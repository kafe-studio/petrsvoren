# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: kafe-studio/petrsvoren
  branch: main
  # URL OAuth proxy workeru (sveltia-cms-auth). Nahraď po jeho nasazení.
  base_url: https://OAUTH-WORKER.ukazka.workers.dev

# Výchozí složka pro média (přepsáno per-kolekce na co-located).
media_folder: src/content/photos
public_folder: /

# Čeština v rozhraní
locale: cs

collections:
  - name: photos
    label: Fotky
    label_singular: Fotka
    folder: src/content/photos
    media_folder: ""
    public_folder: ""
    create: true
    slug: "{{fields.section}}-{{slug}}"
    summary: "{{fields.section}} — {{fields.caption}}"
    sortable_fields: [order, section, caption]
    fields:
      - label: Sekce
        name: section
        widget: select
        options:
          - { label: Street, value: street }
          - { label: Lidé, value: lide }
          - { label: Samota, value: samota }
          - { label: Krajina, value: krajina }
          - { label: Cesty, value: cesty }
      - { label: Popisek (krátký text pod fotkou), name: caption, widget: string }
      - { label: Fotka, name: cover, widget: image }
      - { label: Alt text (pro přístupnost), name: coverAlt, widget: string, required: false }
      - { label: Pořadí v sekci, name: order, widget: number, default: 0, value_type: int }
      - { label: Dlouhý text (rozklik), name: body, widget: markdown, required: false }

  - name: tips
    label: Tipy (Aktuálně)
    label_singular: Tip
    folder: src/content/tips
    media_folder: ""
    public_folder: ""
    create: true
    summary: "{{fields.title}}"
    sortable_fields: [order, title]
    fields:
      - { label: Titulek, name: title, widget: string }
      - { label: Obrázek, name: image, widget: image, required: false }
      - { label: Odkaz (URL), name: link, widget: string, required: false }
      - { label: Pořadí, name: order, widget: number, default: 0, value_type: int }
      - { label: Aktivní (zobrazit na webu), name: active, widget: boolean, default: true }
      - { label: Text, name: body, widget: markdown, required: false }
